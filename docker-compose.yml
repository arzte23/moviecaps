services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/18/docker
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "5432:5432"

volumes:
  pg_data: