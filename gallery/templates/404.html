{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-secondary">404</h1>
            <div class="mb-4">
                <i class="bi bi-camera-reels text-muted" style="font-size: 4rem;"></i>
            </div>
            <h2 class="mb-3">Lost in the Edit?</h2>
            <p class="lead text-secondary mb-5">
                The scene you're looking for isn't in this cut. It might have been deleted or moved to a different reel.
            </p>
            <a href="{% url 'gallery:home' %}" class="btn btn-light rounded-pill px-4 shadow">
                Back to the Gallery
            </a>
        </div>
    </div>
</div>
{% endblock %}
