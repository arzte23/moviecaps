{% extends "base.html" %}

{% block content %}
<div class="container text-center my-5">
  <h1>{{ title }}</h1>
  <p>{{ title.description }}</p>
  <div id="my-gallery" class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 g-4 mt-5">
    {% for screencap in title.caps.all %}
      {% include "gallery/includes/_screencap_card.html" %}
    {% endfor %}
  </div>
</div>
{% endblock %}
