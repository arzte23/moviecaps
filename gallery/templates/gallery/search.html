{% extends "base.html" %}

{% block content %}
<div class="container text-center my-5">
  <h1>Search Results for "{{ query }}"</h1>
  <div id="my-gallery" class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 g-4 mt-5">
    {% for screencap in screencaps %}
      <div class="col">
        <a href="{{ screencap.image.url }}"
           data-pswp-width="{{ screencap.width }}"
           data-pswp-height="{{ screencap.height }}">
        <img src="{{ screencap.image.url }}" class="img-thumbnail" alt="{{ screencap }}">
        </a>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
