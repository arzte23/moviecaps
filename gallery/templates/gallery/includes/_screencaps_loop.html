{% for screencap in page_obj %}
  {% if forloop.last and page_obj.has_next %}
    <div hx-get="{{ request.path }}?page={{ page_obj.next_page_number }}&{{ extra_params }}"
         hx-trigger="revealed"
         hx-swap="afterend">
      {% include "gallery/includes/_screencap_card.html" %}
    </div>
  {% else %}
    {% include "gallery/includes/_screencap_card.html" %}
  {% endif %}
{% endfor %}
