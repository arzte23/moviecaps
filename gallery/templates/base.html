{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MovieCaps - Home{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary-subtle" style="background-color: #1a1d20;">
      <div class="container">
        <a class="navbar-brand" href="{% url 'gallery:home' %}">MovieCaps</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link {% if request.GET.type == 'movie' %}active{% endif %}" 
                href="{% url 'gallery:home' %}?type=movie">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.GET.type == 'series' %}active{% endif %}" 
                href="{% url 'gallery:home' %}?type=series">TV Shows</a>
            </li>
          </ul>
          <form class="d-flex" role="search" method="get" action="{% url 'gallery:search' %}">
            <input name="q" class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-light" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>

    <main class="flex-shrink-0">
      {% block content %}
      {% endblock %}
    </main>

    <footer class="py-4 mt-auto border-top border-secondary-subtle">
      <div class="container text-center">
        <p class="text-secondary mb-0">© 2026 MovieCaps. Created for movie lovers.</p>
        <div class="mt-2">
          <a href="#" class="text-secondary text-decoration-none mx-2 small">About</a>
          <a href="#" class="text-secondary text-decoration-none mx-2 small">GitHub</a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script type="module">
    import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe-lightbox.esm.min.js';
    import PhotoSwipe from 'https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.esm.min.js'
    
    const lightbox = new PhotoSwipeLightbox({
      gallery: '#my-gallery',
      children: 'a.pswp-link',
      pswpModule: PhotoSwipe,
    });

    lightbox.on('uiRegister', function() {
      lightbox.pswp.ui.registerElement({
        name: 'movie-link',
        order: 9,
        isCompound: false,
        appendTo: 'wrapper',
        html: '',
        onInit: (el, pswp) => {
          pswp.on('change', () => {
            const currSlideElement = pswp.currSlide.data.element;
            if (currSlideElement) {
              const movieUrl = currSlideElement.getAttribute('data-movie-url');
              el.innerHTML = `
                <div style="position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 9999;">
                  <a href="${movieUrl}" class="btn btn-light shadow-lg">View Details</a>
                </div>`;
            }
          });
        }
      });
    });

    lightbox.init();
    </script>

  </body>
</html>
